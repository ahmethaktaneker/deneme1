<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sayfa Bulunamadı | Ahmet Haktan Eker</title>
  <meta name="robots" content="noindex, follow" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚖</text></svg>" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root{--bg:#0b0d13;--text:#e8e2d6;--text-muted:#8a8070;--text-faint:#45403b;--accent:#c9a96e;--headline:#f2ece0;--border:rgba(255,255,255,0.07)}
    [data-theme="light"]{--bg:#f6f2ea;--text:#2a2420;--text-muted:#6b5e50;--accent:#9a6f30;--headline:#1a1410;--border:rgba(0,0,0,0.08)}
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center}
    a{color:inherit;text-decoration:none}
    .code{font-size:clamp(6rem,20vw,12rem);font-family:'Playfair Display',serif;font-weight:900;color:var(--accent);opacity:0.12;line-height:1;margin-bottom:-1rem;user-select:none}
    .title{font-family:'Playfair Display',serif;font-size:clamp(1.5rem,4vw,2.2rem);font-weight:900;color:var(--headline);margin-bottom:0.75rem}
    .sub{font-size:0.75rem;letter-spacing:0.1em;color:var(--text-muted);max-width:360px;line-height:1.7;margin-bottom:2.5rem}
    .links{display:flex;gap:0.75rem;flex-wrap:wrap;justify-content:center}
    .link-btn{padding:0.55rem 1.2rem;border:1px solid var(--border);border-radius:3px;font-size:0.65rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-muted);transition:all 0.18s}
    .link-btn:hover{border-color:var(--accent);color:var(--accent)}
    .link-btn.primary{background:var(--accent);color:var(--bg);border-color:var(--accent)}
    .link-btn.primary:hover{background:#d4b87a}
    .search-hint{margin-top:2rem;font-size:0.62rem;letter-spacing:0.1em;color:var(--text-faint)}
    .search-hint kbd{background:var(--border);border:1px solid rgba(255,255,255,0.1);border-radius:3px;padding:0.1rem 0.4rem;font-family:inherit}
  </style>
</head>
<body>
  <div class="code">404</div>
  <h1 class="title">Sayfa Bulunamadı</h1>
  <p class="sub">Aradığın sayfa ya taşındı ya da hiç var olmadı. Aşağıdaki bağlantılardan devam edebilirsin.</p>
  <div class="links">
    <a href="/" class="link-btn primary">← Ana Sayfa</a>
    <a href="/yazilar/" class="link-btn">Tüm Yazılar</a>
    <a href="/#hakkimda" class="link-btn">Hakkımda</a>
  </div>
  <div class="search-hint">Ya da ana sayfada <kbd>Ctrl+K</kbd> ile arama yap</div>
  <script>
    const t=localStorage.getItem('theme')||'dark';
    document.documentElement.setAttribute('data-theme',t);
  </script>
</body>
</html>
